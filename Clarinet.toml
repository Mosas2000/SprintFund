[project]
name = "sprintfund"
description = ""
authors = []
telemetry = false
cache_dir = "./.cache"

# ============================================
# Production Contracts
# ============================================

[contracts.sprintfund-core-v5-ultra]
path = "contracts/sprintfund-core-v5-ultra.clar"
epoch = "latest"

[contracts.sprintfund-core-v5-minimal]
path = "contracts/sprintfund-core-v5-minimal.clar"
epoch = "latest"

[contracts.sprintfund-core-v5-micro]
path = "contracts/sprintfund-core-v5-micro.clar"
epoch = "latest"

# ============================================
# Legacy Contracts (for reference/testing)
# ============================================

[contracts.sprintfund-core-v4-minimal]
path = "contracts/sprintfund-core-v4-minimal.clar"
epoch = "latest"

[contracts.sprintfund-core-v3]
path = "contracts/sprintfund-core-v3.clar"
epoch = "latest"

[contracts.sprintfund-core-v2]
path = "contracts/sprintfund-core-v2.clar"
epoch = "latest"

[contracts.sprintfund-core]
path = "contracts/sprintfund-core.clar"
epoch = "latest"

# ============================================
# Supporting Contracts
# ============================================

[contracts.sprintfund-logger]
path = "contracts/sprintfund-logger.clar"
epoch = "latest"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }

# Check-checker settings:
# trusted_sender: if true, inputs are trusted after tx_sender has been checked.
# trusted_caller: if true, inputs are trusted after contract-caller has been checked.
# callee_filter: if true, untrusted data may be passed into a private function without a
# warning, if it gets checked inside. This check will also propagate up to the
# caller.
# More informations: https://www.hiro.so/blog/new-safety-checks-in-clarinet
# v3 moved to top
