apiVersion: v1
kind: Service
metadata:
  name: sprintfund-frontend
  labels:
    app: sprintfund-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: sprintfund-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: sprintfund-frontend-nodeport
  labels:
    app: sprintfund-frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
    protocol: TCP
    name: http
  selector:
    app: sprintfund-frontend
