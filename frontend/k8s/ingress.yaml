apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sprintfund-frontend
  labels:
    app: sprintfund-frontend
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - sprintfund.app
    - www.sprintfund.app
    secretName: sprintfund-tls
  rules:
  - host: sprintfund.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sprintfund-frontend
            port:
              number: 80
  - host: www.sprintfund.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sprintfund-frontend
            port:
              number: 80
